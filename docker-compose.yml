# docker-compose.yml — Local dev stack for the Gantry LPR microservice
#
# Start:   docker compose up -d
# Logs:    docker compose logs -f gantry-lpr
# RabbitMQ UI:  http://localhost:15673  (guest / guest)
# Plate API:    http://localhost:8081/docs
# Stop:    docker compose down

services:
  gantry-lpr:
    build: .
    env_file:
      - .env
    ports:
      - "8081:8000"
    volumes:
      # Ensure your local model file exists in the same directory
      - ./plate_model.pt:/app/plate_model.pt:ro
    environment:
      - AMQP_URL=amqps://wbchnboq:DGHYxMyq8-ZPk6ieghUs0sfe766XegQq@armadillo.rmq.cloudamqp.com:5671/wbchnboq
      - GANTRY_ID=gantry-01
      - DETECT_CONF=0.5
      - HF_TOKEN=${HF_TOKEN}
      - STREAM_URL=${STREAM_URL}
      - PORT=${PORT}
    restart: unless-stopped