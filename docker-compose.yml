services:
  ocr-service:
    build: ./ocr_service
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./plate_model.pt:/app/plate_model.pt:ro
    environment:
      - MODEL_PATH=/app/plate_model.pt
      - DETECT_CONF=0.5
      - HF_TOKEN=${HF_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # TrOCR needs time to load on first start

  camera-service:
    build: ./camera_service
    env_file:
      - .env
    ports:
      - "8002:8002"
    environment:
      - STREAM_URL=${STREAM_URL}
    restart: unless-stopped

  detect-plate-service:
    build: ./detect_plate_service
    env_file:
      - .env
    ports:
      - "8081:8000"
    environment:
      - PORT=${PORT}
      - AMQP_URL=${AMQP_URL}
      - GANTRY_ID=${GANTRY_ID}
      - CAMERA_SERVICE_URL=http://camera-service:8002
      - OCR_SERVICE_URL=http://ocr-service:8001
      - PROCESS_INTERVAL=${PROCESS_INTERVAL}
      - COOLDOWN_S=${COOLDOWN_S}
    restart: unless-stopped
    depends_on:
      ocr-service:
        condition: service_healthy   # ← waits for model to actually be ready
      camera-service:
        condition: service_started