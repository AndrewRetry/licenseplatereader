services:

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"       # management UI → guest/guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr_service
      args:
        HF_TOKEN: ${HF_TOKEN}   # only needed at build time
    env_file: .env
    ports:
      - "8001:8001"
    environment:
      - MODEL_PATH=/app/plate_model.pt
      - DETECT_CONF=${DETECT_CONF}
    volumes:
      - ./plate_model.pt:/app/plate_model.pt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  camera-service:
    build: ./camera_service
    env_file: .env
    ports:
      - "8002:8002"
    environment:
      - STREAM_URL=${STREAM_URL}
    restart: unless-stopped

  detect-plate-service:
    build: ./detect_plate_service
    env_file: .env
    ports:
      - "8081:8000"
    environment:
      - PORT=${PORT}
      - AMQP_URL=${AMQP_URL}
      - GANTRY_ID=${GANTRY_ID}
      - CAMERA_SERVICE_URL=http://camera-service:8002
      - OCR_SERVICE_URL=http://ocr-service:8001
      - PROCESS_INTERVAL=${PROCESS_INTERVAL}
      - COOLDOWN_S=${COOLDOWN_S}
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
      camera-service:
        condition: service_started
        
  gantry-interface:
    build: ./gantry-interface
    ports:
      - "3500:3500"
    env_file:
      - ./gantry-interface/.env
    environment:
      - DETECT_SERVICE_URL=http://detect-plate-service:8000
    restart: unless-stopped
    depends_on:
      - detect-plate-service