<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Plate Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent-dim: #8aaa1f;
    --text: #f0f0f0;
    --text-muted: #888;
    --red: #ff4444;
    --green: #22c55e;
    --amber: #f59e0b;
    --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); }
  #status-pill {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    transition: all 0.3s;
  }
  #status-pill.ready   { border-color: var(--green); color: var(--green); }
  #status-pill.scanning { border-color: var(--accent); color: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  #status-pill.error   { border-color: var(--red); color: var(--red); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 0;
  }

  /* ── Camera panel ── */
  .cam-panel {
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Scanner overlay */
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .scanning .scan-line {
    opacity: 0.8;
    animation: scan 1.8s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { top: 20%; }
    100% { top: 80%; }
  }

  /* Crosshair reticle */
  .reticle {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 80px;
    border: 1.5px solid rgba(200,241,53,0.5);
    border-radius: 4px;
  }
  .reticle::before, .reticle::after {
    content: '';
    position: absolute;
    border-color: var(--accent);
    border-style: solid;
  }
  .reticle::before {
    top: -1px; left: -1px;
    width: 20px; height: 20px;
    border-width: 2px 0 0 2px;
    border-radius: 4px 0 0 0;
  }
  .reticle::after {
    bottom: -1px; right: -1px;
    width: 20px; height: 20px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 4px 0;
  }

  /* Cam off placeholder */
  .cam-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .cam-placeholder .icon {
    font-size: 40px;
    opacity: 0.3;
  }

  /* Controls bar */
  .cam-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    align-items: center;
    gap: 12px;
  }

  button {
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { opacity: 0.8; transform: translateY(-1px); }
  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0a;
    border-color: var(--accent);
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
  }

  #interval-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 10px;
    color: var(--text-muted);
  }
  #interval-row input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }
  #interval-display {
    min-width: 36px;
    color: var(--accent);
  }

  /* Canvas hidden — used for frame capture */
  #canvas { display: none; }

  /* ── Results panel ── */
  .results-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Best result */
  #best-plate {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent);
    min-height: 44px;
    transition: all 0.2s;
  }
  #best-plate.empty { color: var(--border); }

  .plate-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .meta-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 10px;
  }
  .meta-chip .k { color: var(--text-muted); display: block; margin-bottom: 2px; }
  .meta-chip .v { color: var(--text); font-weight: 700; }
  .meta-chip.conf-high  .v { color: var(--green); }
  .meta-chip.conf-medium .v { color: var(--amber); }
  .meta-chip.conf-low   .v { color: var(--red); }

  /* History */
  .history-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .history-scroll::-webkit-scrollbar { width: 4px; }
  .history-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .history-item {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.2s ease;
    cursor: pointer;
    transition: background 0.1s;
  }
  .history-item:hover { background: var(--surface); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:none } }

  .history-plate {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    flex: 1;
  }
  .history-time {
    font-size: 9px;
    color: var(--text-muted);
  }
  .conf-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .conf-badge.high   { background: rgba(34,197,94,0.15); color: var(--green); }
  .conf-badge.medium { background: rgba(245,158,11,0.15); color: var(--amber); }
  .conf-badge.low    { background: rgba(255,68,68,0.15); color: var(--red); }

  .no-detections {
    padding: 32px 20px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* Stats bar */
  .stats-bar {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .stats-bar span { color: var(--text); font-weight: 700; }

  /* Upload fallback */
  #upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 16px;
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  #upload-zone:hover { border-color: var(--accent); color: var(--accent); }
  #upload-input { display: none; }

  /* API URL input */
  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
  }
  .api-row label { font-size: 9px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
  .api-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 5px 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: var(--accent); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 11px;
    transition: transform 0.25s;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 780px) {
    main { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
    .cam-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SG Plate Scanner <span>// licenseplatereader</span></div>
  <div id="status-pill">OFFLINE</div>
</header>

<main>
  <!-- Camera -->
  <div class="cam-panel" id="cam-panel">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-line"></div>
      <div class="reticle"></div>
    </div>

    <div class="cam-placeholder" id="cam-placeholder">
      <div class="icon">📷</div>
      <div>Click START CAMERA to begin</div>
    </div>

    <div class="cam-controls">
      <button class="btn-primary" id="btn-start">Start camera</button>
      <button class="btn-secondary" id="btn-capture" style="display:none">Capture</button>
      <button class="btn-danger"   id="btn-stop"    style="display:none">Stop</button>

      <div id="interval-row" style="display:none">
        <span>Auto-scan</span>
        <input type="range" id="interval-slider" min="500" max="5000" step="500" value="2000">
        <span id="interval-display">2.0s</span>
        <button class="btn-secondary" id="btn-auto" style="padding:6px 12px">Auto: OFF</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <div class="api-row">
      <label>API</label>
      <input type="text" id="api-url" value="http://localhost:3001/api/plate/detect" spellcheck="false">
    </div>

    <div class="panel-section">
      <div class="panel-label">Last detection</div>
      <div id="best-plate" class="empty">——</div>
      <div class="plate-meta" id="plate-meta"></div>
    </div>

    <div class="panel-section" style="border-bottom:none; padding-bottom:8px">
      <div class="panel-label">Upload image</div>
      <div id="upload-zone">Drop image or click to browse</div>
      <input type="file" id="upload-input" accept="image/*">
    </div>

    <div class="panel-label" style="padding:0 20px 8px; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-muted)">History</div>
    <div class="history-scroll" id="history">
      <div class="no-detections">No detections yet</div>
    </div>

    <div class="stats-bar">
      Scans: <span id="stat-scans">0</span>
      &nbsp; Hits: <span id="stat-hits">0</span>
      &nbsp; Avg: <span id="stat-avg">—</span>ms
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
const video        = document.getElementById('video');
const canvas       = document.getElementById('canvas');
const camPanel     = document.getElementById('cam-panel');
const scanOverlay  = document.getElementById('scan-overlay');
const placeholder  = document.getElementById('cam-placeholder');
const btnStart     = document.getElementById('btn-start');
const btnCapture   = document.getElementById('btn-capture');
const btnStop      = document.getElementById('btn-stop');
const btnAuto      = document.getElementById('btn-auto');
const intervalRow  = document.getElementById('interval-row');
const intervalSlider = document.getElementById('interval-slider');
const intervalDisplay = document.getElementById('interval-display');
const statusPill   = document.getElementById('status-pill');
const bestPlate    = document.getElementById('best-plate');
const plateMeta    = document.getElementById('plate-meta');
const historyEl    = document.getElementById('history');
const uploadZone   = document.getElementById('upload-zone');
const uploadInput  = document.getElementById('upload-input');
const apiUrlInput  = document.getElementById('api-url');
const statScans    = document.getElementById('stat-scans');
const statHits     = document.getElementById('stat-hits');
const statAvg      = document.getElementById('stat-avg');

let stream = null;
let autoTimer = null;
let isAutoOn = false;
let stats = { scans: 0, hits: 0, totalMs: 0 };

// ── Camera ────────────────────────────────────────────────────────────────

btnStart.addEventListener('click', startCamera);
btnStop.addEventListener('click', stopCamera);
btnCapture.addEventListener('click', () => captureAndDetect());
btnAuto.addEventListener('click', toggleAuto);

intervalSlider.addEventListener('input', () => {
  const v = parseInt(intervalSlider.value);
  intervalDisplay.textContent = (v / 1000).toFixed(1) + 's';
  if (isAutoOn) {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => captureAndDetect(), v);
  }
});

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    btnStart.style.display = 'none';
    btnCapture.style.display = 'inline-block';
    btnStop.style.display = 'inline-block';
    intervalRow.style.display = 'flex';
    setStatus('ready', 'READY');
  } catch (err) {
    setStatus('error', 'CAM ERROR');
    toast('Camera error: ' + err.message);
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  video.srcObject = null;
  video.style.display = 'none';
  placeholder.style.display = 'flex';
  btnStart.style.display = 'inline-block';
  btnCapture.style.display = 'none';
  btnStop.style.display = 'none';
  intervalRow.style.display = 'none';
  stopAuto();
  setStatus('', 'OFFLINE');
}

function toggleAuto() {
  isAutoOn = !isAutoOn;
  btnAuto.textContent = 'Auto: ' + (isAutoOn ? 'ON' : 'OFF');
  if (isAutoOn) {
    const interval = parseInt(intervalSlider.value);
    autoTimer = setInterval(() => captureAndDetect(), interval);
    btnAuto.style.borderColor = 'var(--accent)';
    btnAuto.style.color = 'var(--accent)';
  } else {
    stopAuto();
  }
}

function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
  isAutoOn = false;
  btnAuto.textContent = 'Auto: OFF';
  btnAuto.style.borderColor = '';
  btnAuto.style.color = '';
}

// ── Capture & Detect ──────────────────────────────────────────────────────

async function captureAndDetect(sourceFile = null) {
  let blob;

  if (sourceFile) {
    blob = sourceFile;
  } else {
    if (!stream) return;
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0);
    blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
  }

  setStatus('scanning', 'SCANNING');
  scanOverlay.classList.add('scanning');

  const form = new FormData();
  form.append('image', blob, 'frame.jpg');

  const url = apiUrlInput.value.trim();
  const t0 = Date.now();

  try {
    const res = await fetch(url, { method: 'POST', body: form });
    const data = await res.json();
    const elapsed = Date.now() - t0;

    stats.scans++;
    stats.totalMs += elapsed;
    statScans.textContent = stats.scans;
    statAvg.textContent = Math.round(stats.totalMs / stats.scans);

    if (data.success && data.best) {
      stats.hits++;
      statHits.textContent = stats.hits;
      renderBest(data.best);
      addHistory(data.best, elapsed);
    } else {
      renderBest(null);
    }

    setStatus('ready', 'READY');
  } catch (err) {
    setStatus('error', 'API ERROR');
    toast('API error: ' + err.message);
  } finally {
    scanOverlay.classList.remove('scanning');
  }
}

// ── Render ────────────────────────────────────────────────────────────────

function renderBest(best) {
  if (!best) {
    bestPlate.textContent = '——';
    bestPlate.className = 'empty';
    plateMeta.innerHTML = '';
    return;
  }

  bestPlate.textContent = best.formatted || best.plate;
  bestPlate.className = '';

  const confClass = 'conf-' + best.confidence;

  plateMeta.innerHTML = `
    <div class="meta-chip ${confClass}">
      <span class="k">Confidence</span>
      <span class="v">${best.confidence.toUpperCase()} (${best.ocrConfidence?.toFixed(1)}%)</span>
    </div>
    <div class="meta-chip">
      <span class="k">Format</span>
      <span class="v">${(best.format || '—').replace('_', ' ')}</span>
    </div>
    <div class="meta-chip">
      <span class="k">Checksum</span>
      <span class="v" style="color:${best.checksumValid === true ? 'var(--green)' : best.checksumValid === false ? 'var(--red)' : 'var(--text-muted)'}">
        ${best.checksumValid === true ? '✓ valid' : best.checksumValid === false ? '✗ invalid' : '—'}
      </span>
    </div>
    <div class="meta-chip">
      <span class="k">Pipeline</span>
      <span class="v">${best.pipeline || '—'}</span>
    </div>
  `;
}

function addHistory(best, elapsedMs) {
  const noDetEl = historyEl.querySelector('.no-detections');
  if (noDetEl) noDetEl.remove();

  const ts = new Date().toLocaleTimeString('en-SG', { hour12: false });
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-plate">${best.formatted || best.plate}</div>
    <span class="conf-badge ${best.confidence}">${best.confidence}</span>
    <div class="history-time">${ts} · ${elapsedMs}ms</div>
  `;
  item.addEventListener('click', () => {
    navigator.clipboard?.writeText(best.plate);
    toast('Copied: ' + best.plate);
  });
  historyEl.insertBefore(item, historyEl.firstChild);
}

// ── Upload fallback ───────────────────────────────────────────────────────

uploadZone.addEventListener('click', () => uploadInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--accent)'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = ''; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) captureAndDetect(file);
});
uploadInput.addEventListener('change', () => {
  if (uploadInput.files[0]) captureAndDetect(uploadInput.files[0]);
  uploadInput.value = '';
});

// ── Helpers ───────────────────────────────────────────────────────────────

function setStatus(cls, label) {
  statusPill.className = cls;
  statusPill.textContent = cls === 'scanning' ? '● ' + label : label;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// Hide video element initially
video.style.display = 'none';
</script>
</body>
</html>
